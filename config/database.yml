default: &default
  adapter: mysql2
  database: "<%= ENV['MYSQL_DATABASE'] || 'dreamkast' %>"
  username: "<%= ENV['MYSQL_USER'] || 'user' %>"
  password: "<%= ENV['MYSQL_PASSWORD'] || 'password' %>"
  host: "<%= ENV['MYSQL_HOST'] || '127.0.0.1' %>"
  encoding: utf8mb4
  pool: "<%= ENV['MYSQL_CONNECTION_POOL'] || '10' %>"

dkui: &dkui
  adapter: mysql2
  database: "<%= ENV['DKUI_MYSQL_DATABASE'] || 'dkui' %>"
  username: "<%= ENV['DKUI_MYSQL_USER'] || ENV['MYSQL_USER'] || 'user' %>"
  password: "<%= ENV['DKUI_MYSQL_PASSWORD'] || ENV['MYSQL_PASSWORD'] || 'password' %>"
  host: "<%= ENV['DKUI_MYSQL_HOST'] || ENV['MYSQL_HOST'] || '127.0.0.1' %>"
  encoding: utf8mb4
  pool: "<%= ENV['MYSQL_CONNECTION_POOL'] || '10' %>"
  database_tasks: false

development:
  primary:
    <<: *default
  dkui:
    <<: *dkui

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  primary: &test_primary
    adapter: mysql2
    database: dreamkast_test
    username: "<%= ENV['MYSQL_USER'] || 'root' %>"
    password: "<%= ENV['MYSQL_PASSWORD'] || 'root' %>"
    host: "<%= ENV['MYSQL_HOST'] || '127.0.0.1' %>"
    port: "<%= ENV['DATABASE_PORT'] || 3306 %>"
    encoding: utf8mb4
  dkui:
    <<: *test_primary
    database_tasks: false
    replica: true

production:
  primary:
    <<: *default
    # TLS 強制 + サーバ証明書の CA 検証 + ホスト名検証（RDS）
    # CA バンドル(sslca)はコンテナイメージのビルド時に取得する（Dockerfile 参照）
    ssl_mode: "<%= ENV['MYSQL_SSL_MODE'] || 'verify_identity' %>"
    sslca: "<%= ENV['MYSQL_SSL_CA'] || Rails.root.join('config/certs/rds-global-bundle.pem') %>"
  dkui:
    <<: *dkui
    ssl_mode: "<%= ENV['MYSQL_SSL_MODE'] || 'verify_identity' %>"
    sslca: "<%= ENV['MYSQL_SSL_CA'] || Rails.root.join('config/certs/rds-global-bundle.pem') %>"
